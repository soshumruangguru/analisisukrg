<style>

;text-transform:uppercase;color:var(--muted);white-space:nowrap}td{border-bottom:1px solid var(--line);padding:8px 9px;vertical-align:top}tr:hover td{background:#f0eadb}.num{text-align:right;font-family:Consolas,monospace}.badge{display:inline-block;color:#fff;border-radius:12px;padding:2px 8px;font:700 .64rem Consolas,monospace}.b-sb{background:var(--green)}.b-b{background:var(--teal)}.b-c{background:var(--gold)}.b-j{background:var(--rust)}.b-sj{background:var(--red)}.b-ok{background:var(--green)}.b-rev{background:var(--rust)}.b-mudah{background:#1a5276}.b-sedang{background:#444}.b-sulit{background:var(--rust)}.bar{height:14px;background:var(--line);border-radius:3px;overflow:hidden}.bar i{height:100%;display:block}.note{background:var(--cream);border-left:3px solid var(--teal);padding:12px 16px;border-radius:0 4px 4px 0;margin:14px 0;color:#42372b}.warn{border-left-color:var(--rust)}.filters{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0 12px}.filter{border:1px solid var(--line);background:var(--cream);border-radius:14px;padding:4px 10px;font:.7rem Consolas,monospace}.filter.on{background:var(--ink);color:#fff}.hide{display:none}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.dist{border:1px solid var(--line);border-radius:5px;padding:10px}.dist-head{display:flex;justify-content:space-between;font:700 .72rem Consolas,monospace;margin-bottom:8px}.opt{display:flex;align-items:center;gap:7px;font-size:.72rem;margin:4px 0}.opt .l{width:14px;font:700 .72rem Consolas,monospace}.opt .pb{flex:1;height:11px;background:var(--line);border-radius:2px;overflow:hidden}.opt .pb i{display:block;height:100%;background:var(--rust)}.opt.key .pb i{background:var(--green)}.opt .pct{width:46px;text-align:right;font:.66rem Consolas,monospace}.tag{font:.58rem Consolas,monospace;border-radius:8px;padding:1px 5px}.tag.ok{background:#e6f0e6;color:var(--green)}.tag.no{background:#fde8de;color:var(--rust)}.mini-dist{display:flex;align-items:flex-end;gap:6px;height:72px;min-width:128px}.mini-opt{width:20px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:3px}.mini-bar{width:14px;min-height:2px;border-radius:3px 3px 0 0;background:var(--rust)}.mini-opt.key .mini-bar{background:var(--green)}.mini-opt.func .mini-bar{background:var(--gold)}.mini-opt.bad .mini-bar{background:var(--red)}.mini-label{font:700 .58rem Consolas,monospace;color:var(--muted)}.mini-pct{font:.55rem Consolas,monospace;color:var(--muted);writing-mode:vertical-rl;transform:rotate(180deg);max-height:34px}.exclude-box{background:var(--cream);border:1px solid var(--line);border-radius:5px;padding:10px 12px;margin:14px 0}.exclude-title{font:700 .68rem Consolas,monospace;text-transform:uppercase;color:var(--muted);margin-bottom:8px}.qpick{display:flex;flex-wrap:wrap;gap:6px}.qpick label{border:1px solid var(--line);background:var(--paper);border-radius:14px;padding:3px 8px;font:.7rem Consolas,monospace;cursor:pointer}.qpick label:has(input:checked){background:#fde8de;border-color:var(--rust);color:var(--rust)}.qpick input{vertical-align:middle;margin-right:4px}.reset-exclude{margin-top:8px;border:1px solid var(--line);background:transparent;border-radius:12px;padding:3px 10px;font:.68rem Consolas,monospace;color:var(--muted)}.statline strong{font-family:Consolas,monospace}.foot{margin-top:28px;padding-top:12px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:space-between;flex-wrap:wrap;color:var(--muted);font-size:.76rem}
@media(max-width:760px){.grid2{grid-template-columns:1fr}.top{padding:10px 14px}.tabs1,.tabs2{padding:0 12px}.wrap{padding:26px 16px 60px}.card{min-width:92px}}

<body>
<section id="upload" class="upload">
  <div class="brand">UKRG 2026 K12 SMA</div>
  <h1>Platform Analisis Butir</h1>
  <p class="lead">Unggah workbook analisis UKRG. Platform membaca respons dari <span class="mono">Detail Jawaban</span> dan <span class="mono">Jawaban-Geo</span>, lalu menggabungkannya dengan kunci/topik pada sheet mapel.</p>
  <div id="drop" class="drop">
    <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2"><path d="M36 32c3.3 0 6-2.7 6-6 0-3-2.1-5.5-5-6a9 9 0 00-17.6-2A7 7 0 0010 24c0 4.4 3.6 8 8 8"/><path d="M24 20v16M17 27l7-7 7 7"/></svg>
    <div class="mono" style="font-weight:700;margin-top:8px">Seret & lepas file Excel di sini</div>
    <div class="small">atau klik untuk memilih .xlsx / .xls</div>
    <input id="file" type="file" accept=".xlsx,.xls" style="display:none">
  </div>
  <button id="run" class="btn" disabled>Jalankan Analisis</button>
  <div id="progress"><div class="track"><div id="fill" class="fill"></div></div><div id="ptext" class="small" style="margin-top:6px"></div></div>
  <div id="err"></div>
</section>
<section id="result">
  <div class="top"><button id="back" class="btn ghost">&larr; Analisis Baru</button><button id="print" class="btn">Cetak / Simpan PDF</button></div>
  <div id="tabs1" class="tabs1"></div>
  <div id="tabs2" class="tabs2"></div>
  <main id="panels"></main>
</section>
<script>
const KKM=75, SUBJECTS=['Matematika','Bahasa Indonesia','Fisika','Kimia','Sosiologi','Geografi','Bahasa Inggris','Ekonomi','PKN','Sejarah'];
const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmt=n=>Number.isFinite(n)?n.toFixed(2).replace('.',','):'-';
const pct=n=>Number.isFinite(n)?(n*100).toFixed(1).replace('.',',')+'%':'-';
function parsePct(v){if(v==null||v==='')return null;let s=String(v).trim().replace('%','').replace(',','.');let n=parseFloat(s);if(!Number.isFinite(n))return null;return n>1?n/100:n}
function subjOf(mapel){return SUBJECTS.find(s=>mapel.toLowerCase().startsWith(s.toLowerCase()))||'Lainnya'}
function dCat(d,fc){const req=fc==='sulit'?.40:fc==='sedang'?.30:.10,ok=d>req;return{l:ok?'Memenuhi':'Perlu Revisi',s:ok?'ok':'rev',c:ok?'#3a7d44':'#b84b1a',req,r:ok?'Pertahankan':'Revisi: DI belum melewati syarat '+(fc==='sulit'?'soal sulit':fc==='sedang'?'soal sedang':'soal mudah')}}
function bCat(b){if(b>=.60)return{l:'Sangat Baik',s:'sb',c:'#3a7d44'};if(b>=.40)return{l:'Baik',s:'b',c:'#1f6b6e'};if(b>=.20)return{l:'Cukup',s:'c',c:'#c89840'};if(b>=0)return{l:'Rendah',s:'j',c:'#b84b1a'};return{l:'Sangat Rendah',s:'sj',c:'#8b1a1a'}}
function fCat(p){if(p>=.76)return{l:'Mudah',s:'mudah'};if(p>=.26)return{l:'Sedang',s:'sedang'};return{l:'Sulit',s:'sulit'}}
function alpha(scored,n,keys){const N=scored.length;if(N<2||n<2)return null;let sumVar=0;for(let i=0;i<n;i++){const col=scored.map(p=>keys[i]&&p.answers[i]===keys[i]?1:0),m=col.reduce((a,b)=>a+b,0)/N;sumVar+=col.reduce((a,b)=>a+(b-m)**2,0)/N}const totals=scored.map(p=>p.rawScore),mt=totals.reduce((a,b)=>a+b,0)/N,vt=totals.reduce((a,b)=>a+(b-mt)**2,0)/N;return vt?Math.max(0,Math.min(1,(n/(n-1))*(1-sumVar/vt))):null}
let wb=null, state=null;
const drop=$('drop'),file=$('file'),run=$('run');
drop.onclick=()=>file.click();drop.ondragover=e=>{e.preventDefault();drop.classList.add('over')};drop.ondragleave=()=>drop.classList.remove('over');drop.ondrop=e=>{e.preventDefault();drop.classList.remove('over');handle(e.dataTransfer.files[0])};file.onchange=()=>handle(file.files[0]);
run.onclick=analyze;$('back').onclick=()=>{$('result').style.display='none';$('upload').style.display='flex';run.disabled=true;run.textContent='Jalankan Analisis';wb=null;state=null;file.value='';$('err').innerHTML=''};
$('print').onclick=()=>{const w=document.querySelector('.subpanel.on .wrap')||document.querySelector('.wrap');if(!w)return alert('Tidak ada laporan aktif.');const st=[...document.querySelectorAll('style')].map(s=>s.textContent).join('\n');const html='<!DOCTYPE html><html><head><meta charset="UTF-8"><style>'+st+'body{background:#fff}.top,.tabs1,.tabs2{display:none}.panel,.subpanel{display:block!important}.wrap{max-width:100%;padding:20px}@page{margin:15mm}</style></head><body><div class="wrap">'+w.innerHTML+'</div></body></html>';const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([html],{type:'text/html'}));a.download='ukrg-2026-analisis-report.html';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),3000)}
function handle(f){if(!f)return;if(!/\.(xlsx|xls)$/i.test(f.name)){showErr('Format tidak didukung.');return}const r=new FileReader();r.onload=e=>{try{wb=XLSX.read(e.target.result,{type:'array'});run.disabled=false;run.textContent='Jalankan Analisis ('+wb.SheetNames.length+' sheet)';$('err').innerHTML=''}catch(ex){showErr('Gagal membaca file: '+ex.message)}};r.readAsArrayBuffer(f)}
function showErr(m){$('err').innerHTML='<div class="err">'+esc(m)+'</div>'}
function progress(p,t){$('progress').style.display='block';$('fill').style.width=p+'%';$('ptext').textContent=t}
function rowsOf(sheet){return XLSX.utils.sheet_to_json(wb.Sheets[sheet],{header:1,raw:false,defval:''})}
function headerMap(row){const m={};row.forEach((h,i)=>m[String(h).trim()]=i);return m}
function qCols(headers){return headers.map((h,i)=>({h:String(h).trim().replace(/\.0$/,''),i})).filter(x=>/^\d+$/.test(x.h)).map(x=>({num:+x.h,i:x.i})).sort((a,b)=>a.num-b.num)}
function buildMeta(){
  const meta=new Map();
  wb.SheetNames.filter(s=>!['List Mapel','Detail Jawaban','Jawaban-Geo'].includes(s)).forEach(sheet=>{
    const rows=rowsOf(sheet); if(!rows.length)return; const h=headerMap(rows[0]); if(h['Mapel']==null||h['No.']==null)return;
    rows.slice(1).forEach(r=>{const mp=String(r[h['Mapel']]||'').trim(),no=parseInt(r[h['No.']]); if(!mp||!no)return; if(!meta.has(mp))meta.set(mp,[]);
      meta.get(mp).push({num:no,source:sheet,qid:r[h['ID Question']]||'',topic:r[h['Topik']]||'',sub1:r[h['Subtopik 1']]||'',sub2:r[h['Subtopik 2']]||'',key:String(r[h['Kunci Jawaban']]||'').trim().toUpperCase(),officialP:parsePct(r[h['%Benar']]),officialD:parsePct(r[h['DP\n(Tingkat Kesulitan)']])||parsePct(r[h['DP\n(Daya Pembeda)']])||parsePct(r[h['DP']]),officialTK:String(r[h['Interpretasi TK']]||''),officialDP:String(r[h['Interpretasi DP']]||''),optionStatus:String(r[h['Status Opsi Jawaban']]||'')});
    })
  });
  meta.forEach(v=>v.sort((a,b)=>a.num-b.num)); return meta;
}
function buildResponses(){
  const res=new Map(), sheets=wb.SheetNames.filter(s=>['Detail Jawaban','Jawaban-Geo'].includes(s));
  sheets.forEach(sheet=>{const rows=rowsOf(sheet); if(!rows.length)return; const h=headerMap(rows[0]), qs=qCols(rows[0]); if(h['Mapel']==null||h['STATUS MODEL']==null||!qs.length)return;
    rows.slice(1).forEach(r=>{const mp=String(r[h['Mapel']]||'').trim(); if(!mp)return; if(!res.has(mp))res.set(mp,{rows:[],excluded:0,status:{},source:[]}); const o=res.get(mp); const st=String(r[h['STATUS MODEL']]||'').trim().toUpperCase(); o.status[st]=(o.status[st]||0)+1; if(!o.source.includes(sheet))o.source.push(sheet); if(st==='EXCLUDED'){o.excluded++;return}
      const answers=qs.map(q=>String(r[q.i]||'').trim().toUpperCase()); if(answers.every(a=>!a||a==='-'))return;
      o.rows.push({status:st||'UNKNOWN',score:parseFloat(String(r[h['Final Score']]||'').replace(',','.')),benar:parseFloat(r[h['Benar']])||0,answers});
    })
  }); return res;
}
function analyzeMapel(mp,metaItems,resp){
  const nMeta=metaItems.length, keys=metaItems.map(x=>x.key), hasKeys=keys.filter(k=>/^[A-E]$/.test(k)).length;
  const raw=resp?resp.rows:[], nItems=hasKeys?hasKeys:nMeta; const usable=raw.filter(p=>p.answers.some(a=>a&&a!=='-'));
  const out={mapel:mp,subject:subjOf(mp),metaItems,raw:usable,excluded:resp?resp.excluded:0,status:resp?resp.status:{},source:resp?resp.source:[],items:[],canCompute:!!(usable.length&&hasKeys===nMeta&&nMeta>0),warnings:[]};
  if(!usable.length)out.warnings.push('Tidak ada respons peserta valid.');
  if(!nMeta)out.warnings.push('Metadata/kunci tidak ditemukan.');
  if(nMeta&&hasKeys<nMeta)out.warnings.push('Kunci jawaban belum lengkap, analisis benar-salah per butir tidak dihitung.');
  if(!out.canCompute){out.N=usable.length;out.nItems=nMeta;return out}
  const scored=usable.map(p=>{let s=0;for(let i=0;i<nItems;i++)if(keys[i]&&p.answers[i]===keys[i])s++;return {...p,rawScore:s}});
  scored.sort((a,b)=>b.rawScore-a.rawScore); const N=scored.length,k27=Math.round(N*.27),upper=scored.slice(0,k27),lower=scored.slice(N-k27),masters=scored.filter(p=>p.status==='PASSED'||(p.rawScore/nItems*100)>=KKM),non= scored.filter(p=>p.status!=='PASSED'&&(p.rawScore/nItems*100)<KKM);
  for(let i=0;i<nItems;i++){const key=keys[i], correct=scored.filter(p=>p.answers[i]===key).length, pval=N?correct/N:0, u=upper.filter(p=>p.answers[i]===key).length,l=lower.filter(p=>p.answers[i]===key).length,D=k27?u/k27-l/k27:0, mpas=masters.filter(p=>p.answers[i]===key).length,nm=non.filter(p=>p.answers[i]===key).length, B=(masters.length?mpas/masters.length:0)-(non.length?nm/non.length:0);
    const opts=['A','B','C','D','E'],oC={};opts.forEach(o=>oC[o]=0);let blank=0;scored.forEach(p=>{const a=p.answers[i];if(!a||a==='-')blank++;else if(oC[a]!=null)oC[a]++}); const fc=fCat(pval),dc=dCat(D,fc.s),bc=bCat(B),mi=metaItems[i];
    const dist=opts.map(o=>{const uc=upper.filter(p=>p.answers[i]===o).length,lc=lower.filter(p=>p.answers[i]===o).length,pctv=N?oC[o]/N:0;return{option:o,count:oC[o],pct:pctv,functional:o!==key&&pctv>=.05&&lc>uc}});
    out.items.push({num:i+1,key,meta:mi,p:pval,fc,D,dc,B,bc,correct,blank,dist,rec:dc.r});
  }
  out.N=N;out.nItems=nItems;out.k27=k27;out.nM=masters.length;out.nNM=non.length;out.alpha=alpha(scored,nItems,keys);return out;
}
async function analyze(){
  if(!wb)return;progress(8,'Membaca struktur workbook...');await new Promise(r=>setTimeout(r,20));
  const meta=buildMeta(), resp=buildResponses(), list=wb.SheetNames.includes('List Mapel')?rowsOf('List Mapel').map(r=>String(r[0]||'').trim()).filter(Boolean):[];
  const names=[...new Set([...list,...meta.keys(),...resp.keys()])].sort((a,b)=>subjOf(a).localeCompare(subjOf(b))||a.localeCompare(b));
  progress(45,'Menghitung analisis per paket...');await new Promise(r=>setTimeout(r,20));
  const results=names.map(mp=>analyzeMapel(mp,meta.get(mp)||[],resp.get(mp))).filter(x=>x.raw.length||x.metaItems.length);
  state={results,subjects:[...new Set(results.map(r=>r.subject))].sort((a,b)=>SUBJECTS.indexOf(a)-SUBJECTS.indexOf(b))}; render();progress(100,'Selesai');setTimeout(()=>{$('progress').style.display='none';$('upload').style.display='none';$('result').style.display='block';window.scrollTo(0,0)},160);
}
function render(){
  const t1=$('tabs1'),pan=$('panels');t1.innerHTML='';pan.innerHTML='';state.subjects.forEach((s,si)=>{const b=document.createElement('button');b.className='tab '+(si?'':'on');b.textContent=s;b.onclick=()=>switchSubject(s);t1.appendChild(b);
    const p=document.createElement('section');p.className='panel '+(si?'':'on');p.dataset.subject=s;pan.appendChild(p); const list=state.results.filter(r=>r.subject===s); list.forEach((r,ri)=>{const sp=document.createElement('div');sp.className='subpanel '+(ri?'':'on');sp.dataset.mapel=r.mapel;sp.innerHTML='<div class="wrap">'+report(r)+'</div>';p.appendChild(sp)}); const sum=document.createElement('div');sum.className='subpanel';sum.dataset.mapel='__summary';sum.innerHTML='<div class="wrap">'+summary(s,list)+'</div>';p.appendChild(sum)});
  renderTabs2(state.subjects[0]); bindInteractive();
}
function renderTabs2(subject){const t2=$('tabs2');t2.innerHTML='';const list=state.results.filter(r=>r.subject===subject);list.forEach((r,i)=>{const b=document.createElement('button');b.className='tab '+(i?'':'on');b.textContent=r.mapel.replace(subject,'').trim()||r.mapel;b.onclick=()=>switchMapel(subject,r.mapel);t2.appendChild(b)});const b=document.createElement('button');b.className='tab';b.textContent='Ringkasan '+subject;b.onclick=()=>switchMapel(subject,'__summary');t2.appendChild(b)}
function switchSubject(s){document.querySelectorAll('#tabs1 .tab').forEach(b=>b.classList.toggle('on',b.textContent===s));document.querySelectorAll('#panels>.panel').forEach(p=>p.classList.toggle('on',p.dataset.subject===s));renderTabs2(s);bindInteractive(document.querySelector('.panel.on'));window.scrollTo({top:0,behavior:'smooth'})}
function switchMapel(s,m){document.querySelectorAll('#tabs2 .tab').forEach(b=>b.classList.remove('on'));[...document.querySelectorAll('#tabs2 .tab')].find(b=>m==='__summary'?b.textContent.startsWith('Ringkasan'):state.results.find(r=>r.mapel===m)&&b.textContent===(state.results.find(r=>r.mapel===m).mapel.replace(s,'').trim()||m))?.classList.add('on');document.querySelectorAll('.panel.on .subpanel').forEach(p=>p.classList.toggle('on',p.dataset.mapel===m));bindInteractive(document.querySelector('.panel.on .subpanel.on'));window.scrollTo({top:0,behavior:'smooth'})}
function report(r){let h='<header><div class="eyebrow">Analisis Butir UKRG 2026 K12 SMA</div><h1>'+esc(r.mapel)+'</h1><p class="sub">Sumber respons: '+esc(r.source.join(', ')||'-')+' &middot; Metadata: '+esc((r.metaItems[0]&&r.metaItems[0].source)||'-')+'</p><div class="meta"><div><span class="ml">Peserta Valid</span><span class="mv">'+(r.N||0)+'</span></div><div><span class="ml">Excluded</span><span class="mv">'+r.excluded+'</span></div><div><span class="ml">Butir</span><span class="mv" data-metric="items">'+(r.nItems||r.metaItems.length)+'</span></div>'+(r.canCompute?'<div><span class="ml">k27</span><span class="mv">'+r.k27+'</span></div><div><span class="ml">Alpha</span><span class="mv" data-metric="alpha">'+fmt(r.alpha)+'</span></div><div><span class="ml">Masters</span><span class="mv" data-metric="masters">'+r.nM+'</span></div>':'')+'</div></header>';
  if(r.warnings.length)h+='<div class="note warn">'+r.warnings.map(esc).join('<br>')+'</div>';
  if(!r.canCompute)return h+metaOnly(r);
  const easy=r.items.filter(i=>i.fc.s==='mudah').length,med=r.items.filter(i=>i.fc.s==='sedang').length,hard=r.items.filter(i=>i.fc.s==='sulit').length,okD=r.items.filter(i=>i.dc.s==='ok').length,revD=r.items.filter(i=>i.dc.s==='rev').length,avgP=r.items.reduce((s,i)=>s+i.p,0)/r.items.length,avgD=r.items.reduce((s,i)=>s+i.D,0)/r.items.length,avgDOK=avgD>=.26;
  h+='<div class="cards"><div class="card"><div class="cn" data-card="easy">'+easy+'</div><div class="cl">Mudah</div></div><div class="card"><div class="cn" data-card="med">'+med+'</div><div class="cl">Sedang</div></div><div class="card"><div class="cn" data-card="hard">'+hard+'</div><div class="cl">Sulit</div></div><div class="card"><div class="cn" data-card="avgp">'+fmt(avgP)+'</div><div class="cl">Rerata p</div></div><div class="card"><div class="cn" data-card="avgd">'+fmt(avgD)+'</div><div class="cl">Rerata D</div></div><div class="card"><div class="cn" data-card="pkgd" style="color:'+(avgDOK?'var(--green)':'var(--rust)')+'">'+(avgDOK?'OK':'Revisi')+'</div><div class="cl">Paket D &ge; 0,26</div></div><div class="card"><div class="cn" data-card="okd">'+okD+'</div><div class="cl">DI Memenuhi</div></div><div class="card"><div class="cn" data-card="revd">'+revD+'</div><div class="cl">DI Revisi</div></div><div class="card"><div class="cn" data-card="alpha">'+fmt(r.alpha)+'</div><div class="cl">Alpha</div></div></div>';
  h+='<div class="note statline" data-statline></div><div class="exclude-box"><div class="exclude-title">Kecualikan soal dari analisis</div><div class="qpick">'+r.items.map(i=>'<label><input type="checkbox" data-q="'+i.num+'">'+i.num+'</label>').join('')+'</div><button class="reset-exclude" type="button">Reset pilihan</button></div>';
  h+='<div class="sec">Analisis Butir Terpadu</div>'+filters([['all','Semua',r.items.length],['ok','DI Memenuhi',okD],['rev','DI Revisi',revD]],'d')+'<table><thead><tr><th>No</th><th>ID/Topik</th><th>Kunci</th><th>p</th><th>Tingkat Kesulitan</th><th>DI</th><th>Syarat DI</th><th>Status DI</th><th>Pengecoh</th><th>Rekomendasi</th></tr></thead><tbody>';
  r.items.forEach(i=>{const funcCount=i.dist.filter(o=>o.option!==i.key&&o.functional).length,nonFuncCount=i.dist.filter(o=>o.option!==i.key&&!o.functional&&o.count>0).length;const maxPct=Math.max(...i.dist.map(o=>o.pct),.01);const bars='<div class="mini-dist">'+i.dist.map(o=>{const cls=o.option===i.key?'key':(o.functional?'func':(o.count>0?'bad':''));const hp=Math.max(2,Math.round((o.pct/maxPct)*52));return '<div class="mini-opt '+cls+'" title="'+o.option+' '+pct(o.pct)+(o.option===i.key?' (kunci)':o.functional?' (fungsional)':'')+'"><span class="mini-pct">'+pct(o.pct)+'</span><i class="mini-bar" style="height:'+hp+'px"></i><span class="mini-label">'+o.option+'</span></div>';}).join('')+'</div>';h+='<tr data-q="'+i.num+'" data-d="'+i.dc.s+'" data-fc="'+i.fc.s+'" data-p="'+i.p+'" data-di="'+i.D+'" data-func="'+funcCount+'" data-nonfunc="'+nonFuncCount+'"><td class="num">'+i.num+'</td><td><strong>'+esc(i.meta.qid||'-')+'</strong><br><span class="small">'+esc(i.meta.topic||i.meta.sub1||'')+'</span></td><td class="num">'+i.key+'</td><td class="num">'+fmt(i.p)+'</td><td><span class="badge b-'+i.fc.s+'">'+i.fc.l+'</span></td><td class="num">'+fmt(i.D)+'</td><td class="num">D &gt; '+fmt(i.dc.req)+'</td><td><span class="badge b-'+i.dc.s+'">'+i.dc.l+'</span></td><td>'+bars+'</td><td>'+i.rec+'</td></tr>'});h+='</tbody></table>';
  h+='<div class="note">Pada diagram pengecoh: hijau = kunci, kuning = pengecoh fungsional, merah = opsi dipilih tetapi belum fungsional. Pengecoh fungsional ditandai bila opsi selain kunci dipilih minimal 5% peserta dan lebih banyak dipilih kelompok bawah daripada kelompok atas. DI = P upper - P bottom; top 27% = upper, bottom 27% = bottom.</div><div class="foot"><span>'+esc(r.mapel)+'</span><span>DI: sulit D&gt;0,40; sedang D&gt;0,30; mudah D&gt;0,10; paket D&ge;0,26</span></div>';return h}
function filters(arr,kind){return'<div class="filters" data-kind="'+kind+'">'+arr.map((x,i)=>'<button class="filter '+(i?'':'on')+'" data-val="'+x[0]+'">'+x[1]+' <span>'+x[2]+'</span></button>').join('')+'</div>'}
function bindFilter(el){if(el.dataset.bound)return;el.dataset.bound=1;el.onclick=e=>{const b=e.target.closest('.filter');if(!b)return;el.querySelectorAll('.filter').forEach(x=>x.classList.remove('on'));b.classList.add('on');updateActiveStats(el.closest('.wrap'))}}
function bindExclude(box){if(box.dataset.bound)return;box.dataset.bound=1;box.addEventListener('change',()=>updateActiveStats(box.closest('.wrap')));const reset=box.querySelector('.reset-exclude');if(reset)reset.onclick=()=>{box.querySelectorAll('input[type=checkbox]').forEach(i=>i.checked=false);updateActiveStats(box.closest('.wrap'))}}
function alphaSubset(scored,idxs,keys){const N=scored.length,n=idxs.length;if(N<2||n<2)return null;let sumVar=0;for(let j=0;j<n;j++){const idx=idxs[j],key=keys[j],col=scored.map(p=>p.answers[idx]===key?1:0),m=col.reduce((a,b)=>a+b,0)/N;sumVar+=col.reduce((a,b)=>a+(b-m)**2,0)/N}const totals=scored.map(p=>p.rawScore),mt=totals.reduce((a,b)=>a+b,0)/N,vt=totals.reduce((a,b)=>a+(b-mt)**2,0)/N;return vt?Math.max(0,Math.min(1,(n/(n-1))*(1-sumVar/vt))):null}
function calcActiveResult(wrap,activeRows){const sp=wrap.closest('.subpanel'),mp=sp&&sp.dataset.mapel,r=state&&state.results&&state.results.find(x=>x.mapel===mp);const nums=new Set(activeRows.map(tr=>tr.dataset.q)),items=r?r.items.filter(i=>nums.has(String(i.num))):[];if(!r||!items.length)return null;const idxs=items.map(i=>i.num-1),keys=items.map(i=>i.key),scored=r.raw.map(p=>{let s=0;idxs.forEach((idx,j)=>{if(p.answers[idx]===keys[j])s++});return{...p,rawScore:s}}).sort((a,b)=>b.rawScore-a.rawScore);return{items,alpha:alphaSubset(scored,idxs,keys),masters:items.length?scored.filter(p=>p.status==='PASSED'||p.rawScore/items.length*100>=KKM).length:0}}
function updateTopStats(wrap,activeRows){const n=activeRows.length,easy=activeRows.filter(tr=>tr.dataset.fc==='mudah').length,med=activeRows.filter(tr=>tr.dataset.fc==='sedang').length,hard=activeRows.filter(tr=>tr.dataset.fc==='sulit').length,okD=activeRows.filter(tr=>tr.dataset.d==='ok').length,revD=activeRows.filter(tr=>tr.dataset.d==='rev').length,avgP=n?activeRows.reduce((s,tr)=>s+(+tr.dataset.p||0),0)/n:null,avgD=n?activeRows.reduce((s,tr)=>s+(+tr.dataset.di||0),0)/n:null,avgDOK=Number.isFinite(avgD)&&avgD>=.26,active=calcActiveResult(wrap,activeRows),alpha=active?active.alpha:null,masters=active?active.masters:0;const put=(sel,val)=>{const el=wrap.querySelector(sel);if(el)el.textContent=val};put('[data-metric="items"]',n);put('[data-metric="alpha"]',fmt(alpha));put('[data-metric="masters"]',masters);put('[data-card="easy"]',easy);put('[data-card="med"]',med);put('[data-card="hard"]',hard);put('[data-card="avgp"]',fmt(avgP));put('[data-card="avgd"]',fmt(avgD));put('[data-card="okd"]',okD);put('[data-card="revd"]',revD);put('[data-card="alpha"]',fmt(alpha));const pkg=wrap.querySelector('[data-card="pkgd"]');if(pkg){pkg.textContent=avgDOK?'OK':'Revisi';pkg.style.color=avgDOK?'var(--green)':'var(--rust)'}}
function updateActiveStats(wrap){if(!wrap)return;const rows=[...wrap.querySelectorAll('tbody tr[data-q]')];if(!rows.length)return;const checked=new Set([...wrap.querySelectorAll('.exclude-box input:checked')].map(i=>i.dataset.q));const filt=wrap.querySelector('.filters .filter.on'),kind=wrap.querySelector('.filters')?.dataset.kind,val=filt?filt.dataset.val:'all';rows.forEach(tr=>{const ex=checked.has(tr.dataset.q),fm=val!=='all'&&kind&&tr.dataset[kind]!==val;tr.classList.toggle('hide',ex||fm)});const active=rows.filter(tr=>!checked.has(tr.dataset.q));const n=active.length||1,easy=active.filter(tr=>tr.dataset.fc==='mudah').length,med=active.filter(tr=>tr.dataset.fc==='sedang').length,hard=active.filter(tr=>tr.dataset.fc==='sulit').length,avgFunc=active.reduce((s,tr)=>s+(+tr.dataset.func||0),0)/n,avgNon=active.reduce((s,tr)=>s+(+tr.dataset.nonfunc||0),0)/n,avgD=active.reduce((s,tr)=>s+(+tr.dataset.di||0),0)/n;updateTopStats(wrap,active);const stat=wrap.querySelector('[data-statline]');if(stat)stat.innerHTML='Soal aktif: <strong>'+active.length+'</strong> dari '+rows.length+'. Mudah: <strong>'+pct(easy/n)+'</strong>, Sedang: <strong>'+pct(med/n)+'</strong>, Sulit: <strong>'+pct(hard/n)+'</strong>. Rerata pengecoh fungsional: <strong>'+fmt(avgFunc)+'</strong> opsi/soal; tidak fungsional: <strong>'+fmt(avgNon)+'</strong> opsi/soal. Rerata DI aktif: <strong>'+fmt(avgD)+'</strong>.'}
function bindInteractive(root=document){root.querySelectorAll('.filters').forEach(bindFilter);root.querySelectorAll('.exclude-box').forEach(bindExclude);root.querySelectorAll('.wrap').forEach(updateActiveStats)}
function metaOnly(r){let h='<div class="sec">Metadata Butir</div><table><thead><tr><th>Mapel</th><th>No</th><th>ID</th><th>Topik</th><th>Kunci</th><th>TK Sheet</th><th>DP Sheet</th></tr></thead><tbody>';r.metaItems.forEach(i=>h+='<tr><td>'+esc(r.mapel)+'</td><td class="num">'+i.num+'</td><td>'+esc(i.qid||'-')+'</td><td>'+esc(i.topic||i.sub1||'-')+'</td><td class="num">'+esc(i.key||'-')+'</td><td>'+esc(i.officialTK||'-')+'</td><td>'+esc(i.officialDP||'-')+'</td></tr>');return h+'</tbody></table>'}
function summary(subject,list){let h='<header><div class="eyebrow">Ringkasan Mapel</div><h1>'+esc(subject)+'</h1><p class="sub">'+list.length+' paket terdeteksi</p></header><table><thead><tr><th>Paket</th><th class="num">N</th><th class="num">Excluded</th><th class="num">Butir</th><th class="num">Mudah</th><th class="num">Sedang</th><th class="num">Sulit</th><th class="num">Rerata D</th><th>DI Paket</th><th>Status</th></tr></thead><tbody>';list.forEach(r=>{const easy=r.canCompute?r.items.filter(i=>i.fc.s==='mudah').length:'-',med=r.canCompute?r.items.filter(i=>i.fc.s==='sedang').length:'-',hard=r.canCompute?r.items.filter(i=>i.fc.s==='sulit').length:'-',avgDVal=r.canCompute?r.items.reduce((s,i)=>s+i.D,0)/r.items.length:null,avgD=r.canCompute?fmt(avgDVal):'-',avgDStatus=r.canCompute?(avgDVal>=.26?'OK':'Revisi'):'-';h+='<tr><td><strong>'+esc(r.mapel)+'</strong></td><td class="num">'+(r.N||0)+'</td><td class="num">'+r.excluded+'</td><td class="num">'+(r.nItems||r.metaItems.length)+'</td><td class="num">'+easy+'</td><td class="num">'+med+'</td><td class="num">'+hard+'</td><td class="num">'+avgD+'</td><td>'+(r.canCompute?'<span class="badge b-'+(avgDStatus==='OK'?'ok':'rev')+'">'+avgDStatus+'</span>':'-')+'</td><td>'+esc(r.canCompute?'Lengkap':r.warnings.join('; '))+'</td></tr>'});return h+'</tbody></table>'}
</script>
